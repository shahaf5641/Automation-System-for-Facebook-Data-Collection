<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1820" viewBox="0 0 1200 1820" role="img" aria-labelledby="title desc">
  <title id="title">System Flow</title>
  <desc id="desc">Simple vertical flow with yes-no loops for the Facebook Groups Scraper.</desc>
  <defs>
    <style>
      .bg { fill: #f7f3eb; }
      .box { fill: #fffdf8; stroke: #1f2937; stroke-width: 3; rx: 20; ry: 20; }
      .diamond { fill: #fff7e8; stroke: #1f2937; stroke-width: 3; }
      .title-text { fill: #111827; font-family: "Segoe UI", Arial, sans-serif; font-size: 26px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .sub-text { fill: #4b5563; font-family: "Segoe UI", Arial, sans-serif; font-size: 17px; font-weight: 500; text-anchor: middle; dominant-baseline: middle; }
      .label { fill: #8b5e34; font-family: "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #1f2937; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="1820"/>

  <rect class="box" x="430" y="40" width="340" height="90"/>
  <text class="title-text" x="600" y="85">Start</text>

  <rect class="box" x="390" y="180" width="420" height="110"/>
  <text class="title-text" x="600" y="225">Enter Inputs</text>
  <text class="sub-text" x="600" y="255">word, groups, posts</text>

  <rect class="box" x="390" y="340" width="420" height="110"/>
  <text class="title-text" x="600" y="385">Open Chrome</text>
  <text class="sub-text" x="600" y="415">saved profile</text>

  <polygon class="diamond" points="600,470 760,550 600,630 440,550"/>
  <text class="title-text" x="600" y="545">Logged In?</text>

  <rect class="box" x="830" y="495" width="260" height="110"/>
  <text class="title-text" x="960" y="550">Manual Login</text>

  <rect class="box" x="390" y="740" width="420" height="110"/>
  <text class="title-text" x="600" y="785">Find Groups</text>
  <text class="sub-text" x="600" y="815">search + filter</text>

  <rect class="box" x="390" y="900" width="420" height="90"/>
  <text class="title-text" x="600" y="945">Open Group</text>

  <rect class="box" x="390" y="1050" width="420" height="110"/>
  <text class="title-text" x="600" y="1095">Read Posts</text>
  <text class="sub-text" x="600" y="1125">scroll down</text>

  <polygon class="diamond" points="600,1185 760,1275 600,1365 440,1275"/>
  <text class="title-text" x="600" y="1270">Enough Posts?</text>

  <polygon class="diamond" points="600,1425 760,1515 600,1605 440,1515"/>
  <text class="title-text" x="600" y="1510">More Groups?</text>

  <rect class="box" x="390" y="1680" width="420" height="110"/>
  <text class="title-text" x="600" y="1725">Save CSV</text>

  <path class="line" d="M 600 130 L 600 180" marker-end="url(#arrow)"/>
  <path class="line" d="M 600 290 L 600 340" marker-end="url(#arrow)"/>
  <path class="line" d="M 600 450 L 600 470" marker-end="url(#arrow)"/>

  <path class="line" d="M 600 630 L 600 740" marker-end="url(#arrow)"/>
  <text class="label" x="640" y="690">Yes</text>

  <path class="line" d="M 760 550 L 830 550" marker-end="url(#arrow)"/>
  <text class="label" x="795" y="525">No</text>

  <path class="line" d="M 960 605 L 960 690 L 600 690 L 600 740" marker-end="url(#arrow)"/>

  <path class="line" d="M 600 850 L 600 900" marker-end="url(#arrow)"/>
  <path class="line" d="M 600 990 L 600 1050" marker-end="url(#arrow)"/>
  <path class="line" d="M 600 1160 L 600 1185" marker-end="url(#arrow)"/>

  <path class="line" d="M 760 1275 L 930 1275 L 930 1105 L 810 1105" marker-end="url(#arrow)"/>
  <text class="label" x="965" y="1245">No</text>

  <path class="line" d="M 600 1365 L 600 1425" marker-end="url(#arrow)"/>
  <text class="label" x="640" y="1395">Yes</text>

  <path class="line" d="M 440 1515 L 270 1515 L 270 945 L 390 945" marker-end="url(#arrow)"/>
  <text class="label" x="235" y="1485">Yes</text>

  <path class="line" d="M 600 1605 L 600 1680" marker-end="url(#arrow)"/>
  <text class="label" x="640" y="1645">No</text>
</svg>
